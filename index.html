<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Trivia - SPICE Vokasi UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-bounce-container"></div>

    <div class="game-container" id="game-card">
        <h1>TEBAK UI APLIKASI</h1>
        <p id="sub-title">Potongan UI ini milik aplikasi apa?</p>

        <div class="card">
            <img id="question-img" src="" alt="Tebak ini apa">
            <audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- Tambahkan tombol kecil di pojok untuk Mute/Unmute (opsional tapi disarankan) -->
<button id="btn-music" style="position: fixed; bottom: 20px; right: 20px; z-index: 100; border-radius: 50%; width: 50px; height: 50px; background: #FFE300; border: none; cursor: pointer;">
    🎵
</button>
            <div id="answer-section" class="hidden">
                <h2 id="answer-name">NAMA APLIKASI</h2>
            </div>
        </div>

        <div class="controls">
            <button id="btn-reveal">CEK JAWABAN</button>
            <button id="btn-next" class="hidden">NEXT SOAL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
