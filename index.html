<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Trivia - SPICE Vokasi UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Area Background -->
    <div id="bg-bounce-container"></div>

    <!-- Audio ditaruh di luar container utama -->
    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Tombol Musik ditaruh di luar agar fixed-nya aman -->
    <button id="btn-music">🎵</button>

    <!-- Container Utama Game -->
    <div class="game-container" id="game-card">
        <h1>TEBAK UI APLIKASI</h1>
        <p id="sub-title">Potongan UI ini milik aplikasi apa?</p>

        <div class="card">
            <!-- Kosongkan alt agar tidak muncul teks saat gambar belum load -->
            <img id="question-img" src="" alt="">
            
            <div id="answer-section" class="hidden">
                <h2 id="answer-name">NAMA APLIKASI</h2>
            </div>
        </div>

        <div class="controls">
            <button id="btn-reveal">CEK JAWABAN</button>
            <button id="btn-next" class="hidden">NEXT SOAL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
